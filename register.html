<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | HUNTX – Elite Access</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon.ico" sizes="any">
  <!-- AdSense verification (replace YOUR_PUBLISHER_ID after approval) -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1963624194864640"
     crossorigin="anonymous"></script>
</head>
<body class="frontier-page">
  <video id="bgVideo" autoplay muted loop playsinline>
    <source src="your-video.mp4" type="video/mp4"> <!-- Replace with real video -->
  </video>

  <button id="themeToggle"><i class="fa-solid fa-moon"></i></button>

  <header>
    <h1>HUNTX</h1>
    <nav>
      <a href="index.html">HOME</a>
      <a href="shop.html">ARMORY</a>
      <a href="cart.html">LOADOUT</a>
      <a href="login.html">LOGIN</a>
    </nav>
  </header>

  <div class="container" style="min-height:90vh; display:flex; align-items:center; justify-content:center; padding:2rem;">
    <div class="glass" style="width:100%; max-width:480px; padding:4rem 3rem; text-align:center;">
      <h2 style="font-size: clamp(3rem, 8vw, 5rem); margin-bottom:2rem; background: linear-gradient(45deg, #ff6b00, #ffb800); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">
        OPERATIVE REGISTRATION
      </h2>

      <p style="font-size:1.3rem; opacity:0.85; margin-bottom:2.5rem;">
        Create your account to access the armory, save loadouts, and join the frontier network.
      </p>

      <form id="registerForm" style="display:flex; flex-direction:column; gap:1.6rem;">
        <input type="text" id="name" class="input" placeholder="Full Name" required autocomplete="name">
        <input type="email" id="email" class="input" placeholder="Email Address" required autocomplete="email">
        <input type="password" id="password" class="input" placeholder="Password" required autocomplete="new-password" minlength="8">
        <input type="password" id="confirmPassword" class="input" placeholder="Confirm Password" required autocomplete="new-password" minlength="8">

        <button type="submit" id="submitBtn" class="btn" style="padding:1.4rem; font-size:1.4rem; font-weight:900; letter-spacing:1.5px;">
          CREATE ACCOUNT
        </button>
      </form>

      <p id="registerMsg" style="margin-top:2rem; font-size:1.4rem; min-height:2.5rem;"></p>

      <p style="margin-top:2.5rem; font-size:1.2rem;">
        Already have access? <a href="login.html" style="color:#ff6b00; font-weight:700;">Login here</a>
      </p>
    </div>
  </div>

  <footer style="background:rgba(10,10,30,0.9); padding:3rem 5%; text-align:center; border-top:1px solid #ff6b00;">
    <p style="font-size:1.3rem; margin:1rem 0;">© 2026 HUNTX | Newport, Tennessee</p>
    <p style="font-size:1.2rem; opacity:0.9;">
      <a href="privacy.html" style="color:#ff6b00;">Privacy Policy</a> |
      <a href="terms.html" style="color:#ff6b00;">Terms of Service</a> |
      <a href="returns.html" style="color:#ff6b00;">Returns & Refunds</a> |
      <a href="contact.html" style="color:#ff6b00;">Contact Us</a>
    </p>
  </footer>

  <script src="script.js"></script>
  <script>
    // register.html specific logic
    document.getElementById("registerForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirmPassword").value;
      const msg = document.getElementById("registerMsg");
      const submitBtn = document.getElementById("submitBtn");

      // Reset messages
      msg.textContent = "";
      msg.style.color = "#ff6b00";

      // Client-side validation
      if (!name || !email || !password || !confirmPassword) {
        msg.textContent = "All fields are required.";
        msg.style.color = "#e74c3c";
        return;
      }

      if (password.length < 8) {
        msg.textContent = "Password must be at least 8 characters.";
        msg.style.color = "#e74c3c";
        return;
      }

      if (password !== confirmPassword) {
        msg.textContent = "Passwords do not match.";
        msg.style.color = "#e74c3c";
        return;
      }

      // Loading state
      submitBtn.disabled = true;
      submitBtn.textContent = "Creating Account...";

      try {
        const response = await fetch(`${API_BASE}/api/register`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, email, password })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || "Registration failed");
        }

        // Success
        msg.textContent = "Account created! Redirecting to login...";
        msg.style.color = "#2d8b3a";

        // Store token/user (optional – if your backend returns it)
        if (data.token) {
          localStorage.setItem("token", data.token);
          localStorage.setItem("huntx_user", JSON.stringify(data.user));
        }

        setTimeout(() => {
          location.href = "login.html";
        }, 1500);
      } catch (err) {
        msg.textContent = err.message;
        msg.style.color = "#e74c3c";
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "CREATE ACCOUNT";
      }
    });
  </script>
</body>
</html>
