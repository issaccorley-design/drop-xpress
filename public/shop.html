<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARMORY | HUNTX</title>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://js.stripe.com/v3/"></script>
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1963624194864640"
     crossorigin="anonymous"></script>
  <style>
    /* ===========================
       ARMORY HEADER
    =========================== */
    .shop-header h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 6rem;
      text-align: center;
      margin: 4rem 0 2rem;
      background: linear-gradient(45deg, #ff6b00, #ffb800);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 60px rgba(255,107,0,0.6);
    }

    /* ===========================
       FILTERS
    =========================== */
    .category-tabs {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin: 2rem 0;
      flex-wrap: wrap;
    }

    .tab-btn {
      padding: 1rem 2rem;
      border-radius: 50px;
      border: 2px solid rgba(255,107,0,0.4);
      background: rgba(255,255,255,0.05);
      cursor: pointer;
      font-weight: 700;
      transition: 0.3s;
    }

    .tab-btn.active,
    .tab-btn:hover {
      background: #ff6b00;
      color: black;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
      margin: 2rem 0;
      padding: 1.5rem;
      background: rgba(25,25,35,0.7);
      border-radius: 50px;
      border: 1px solid rgba(255,107,0,0.5);
      backdrop-filter: blur(20px);
    }

    .controls input,
    .controls select {
      padding: 1rem 1.8rem;
      border-radius: 50px;
      border: 1px solid rgba(255,107,0,0.5);
      background: rgba(255,255,255,0.1);
      color: white;
      font-weight: 600;
    }

    .controls input::placeholder {
      color: #ccc;
    }

    /* ===========================
       PRODUCTS GRID
    =========================== */
    #product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 2.8rem;
      margin: 3rem 0;
    }

    .product-card {
      background: rgba(30,30,45,0.7);
      border-radius: 32px;
      overflow: hidden;
      border: 1px solid rgba(255,107,0,0.4);
      transition: all 0.6s cubic-bezier(0.23,1,0.32,1);
      box-shadow: 0 20px 50px rgba(0,0,0,0.7);
    }

    .product-card:hover {
      transform: translateY(-25px) scale(1.04);
      box-shadow: 0 0 100px rgba(255,107,0,0.7);
    }

    .product-card img {
      width: 100%;
      height: 300px;
      object-fit: cover;
      transition: transform 0.6s;
    }

    .product-card:hover img {
      transform: scale(1.15);
    }

    .product-info {
      padding: 2rem;
      text-align: center;
    }

    .product-info h3 {
      font-size: 1.9rem;
      margin: 1rem 0 0.5rem;
      font-weight: 700;
    }

    .product-info .brand {
      color: #ff8c00;
      font-weight: 600;
      margin-bottom: 1rem;
    }

    .price-tag {
      font-size: 2.7rem;
      font-weight: 900;
      color: #ff6b00;
      text-shadow: 0 0 40px rgba(255,107,0,0.6);
      margin: 1rem 0;
    }

    .add-btn {
      width: 100%;
      padding: 1.5rem;
      background: linear-gradient(45deg, #ff6b00, #ffb800);
      color: black;
      border: none;
      border-radius: 50px;
      font-size: 1.4rem;
      font-weight: 900;
      cursor: pointer;
      transition: all 0.4s;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .add-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 0 80px rgba(255,107,0,0.9);
    }

    .add-btn.added {
      background: #2d8b3a;
      animation: pulse 0.6s;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    /* ===========================
       FLOATING CART
    =========================== */
    #floating-cart {
      position: fixed; bottom: 30px; right: 30px;
      background: rgba(20,20,30,0.95); border: 2px solid rgba(255,107,0,0.6);
      border-radius: 30px; padding: 1.8rem; max-width: 400px;
      backdrop-filter: blur(20px); box-shadow: 0 20px 60px rgba(0,0,0,0.8);
      z-index: 999; transform: translateY(150%); transition: all 0.4s ease; overflow: hidden;
    }
    #floating-cart.show { transform: translateY(0); }
    #floating-cart.minimized { padding: 1rem 1.8rem; height: 70px; border-radius: 50px; overflow: hidden; }
    .floating-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .toggle-btn { background: none; border: none; color: #ff6b00; font-size: 1.6rem; cursor: pointer; padding: 0.5rem; transition: transform 0.3s; }
    .toggle-btn:hover { transform: scale(1.2); }
    #floating-content { transition: opacity 0.3s ease, max-height 0.4s ease; }
    #floating-cart.minimized #floating-content { opacity: 0; max-height: 0; overflow: hidden; }
    .floating-item { display: flex; align-items: center; gap: 1.2rem; padding: 1rem 0; border-bottom: 1px solid rgba(255,107,0,0.3); }
    .floating-item img { width: 70px; height: 70px; object-fit: cover; border-radius: 14px; }
    .floating-item .info { flex: 1; }
    .remove-btn {
      background: #e74c3c; color: white; border: none; border-radius: 50%;
      width: 28px; height: 28px; font-size: 1.2rem; line-height: 1;
      cursor: pointer; transition: all 0.2s;
    }
    .remove-btn:hover { background: #c0392b; transform: scale(1.15); }
    .floating-total { font-size: 2.2rem; font-weight: 900; color: #ff6b00; text-align: center; margin: 1.5rem 0; }
  </style>
</head>
<body>
  <video id="bgVideo" autoplay muted loop playsinline>
    <source src="your-video.mp4" type="video/mp4"> <!-- Replace with real video URL -->
  </video>
  <button id="themeToggle"><i class="fa-solid fa-moon"></i></button>

  <header>
    <h1>HUNTX</h1>
    <nav>
      <a href="index.html">HOME</a>
      <a href="shop.html" class="active">ARMORY</a>
      <a href="cart.html">LOADOUT (<span id="cart-count">0</span>)</a>
      <a href="checkout.html">CHECKOUT</a>
      <span id="user-info"><a href="login.html">LOGIN</a></span>
    </nav>
  </header>

  <div class="container">
    <div class="shop-header"><h1>ARMORY</h1></div>

    <div class="category-tabs">
      <div class="tab-btn active" data-category="all">ALL GEAR</div>
      <div class="tab-btn" data-category="hunting">HUNTING</div>
      <div class="tab-btn" data-category="fishing">FISHING</div>
    </div>

    <div class="controls">
      <input type="text" id="search" placeholder="SEARCH GEAR...">
      <select id="sort">
        <option value="name">Name A-Z</option>
        <option value="price-low">Price: Low to High</option>
        <option value="price-high">Price: High to Low</option>
      </select>
      <select id="brand-filter">
        <option value="">All Brands</option>
      </select>
      <button onclick="clearFilters()" style="background:#e74c3c; padding:1rem 2rem; border-radius:50px; border:none; color:white; font-weight:700; cursor:pointer;">CLEAR</button>
    </div>

    <!-- OPERATOR SYSTEM -->
    <div id="operator-system" class="glass">
      <h2 class="operator-title">OPERATOR PROFILE</h2>
      <div class="xp-wrapper">
        <div id="xp-bar">
          <div id="xp-progress"></div>
        </div>
        <span id="xp-text"></span>
      </div>
      <div class="operator-layout">
        <!-- 3D OPERATOR -->
        <div id="operator-3d">
          <div id="operator-model"></div>
        </div>
        <!-- EQUIP SLOTS -->
        <div id="operator-slots">
          <div class="operator-slot" data-slot="optic"></div>
          <div class="operator-slot" data-slot="primary"></div>
          <div class="operator-slot" data-slot="secondary"></div>
          <div class="operator-slot" data-slot="accessory"></div>
        </div>
      </div>
      <div id="operator-stats"></div>
      <div id="loadout-score"></div>
    </div>

    <!-- Floating Loadout Preview -->
    <div id="floating-cart" class="minimized">
      <div class="floating-header">
        <h3 style="margin:0; color:#ff6b00; font-size:1.8rem;">LOADOUT PREVIEW</h3>
        <button id="toggle-floating" class="toggle-btn">
          <i class="fa-solid fa-chevron-up"></i>
        </button>
      </div>
      <div id="floating-content">
        <div id="floating-items"></div>
        <div class="floating-total">$0.00</div>
        <a href="cart.html" class="btn" style="margin-top:1.5rem; width:100%; text-align:center; display:block;">VIEW FULL LOADOUT</a>
      </div>
    </div>

    <div id="product-grid" class="products-grid"></div> <!-- Note: class is "products-grid" but ID is "product-grid" for consistency -->
  </div>

  <footer>© 2025 HUNTX — BUILT FOR APEX PREDATORS | Sourced from Sportsman's Supply Inc. (ssisports.net) wholesale catalog</footer>

  <script src="products.js"></script>
  <script src="script.js"></script> <!-- Assumes the consolidated script.js handles everything -->

  <script>
    // shop.html specific init & render logic
    // ──────────────────────────────────────────────
    // RENDER PRODUCTS (fixed to use #product-grid)
    // ──────────────────────────────────────────────
    function renderProducts() {
      const grid = document.getElementById("product-grid");
      if (!grid) return;

      if (filtered.length === 0) {
        grid.innerHTML = `<p style="grid-column:1/-1;text-align:center;font-size:2rem;color:#ff6b00;">NO GEAR FOUND — ADJUST FILTERS</p>`;
        return;
      }

      grid.innerHTML = filtered.map(p => `
        <div class="product-card">
          <img src="${p.images?.[0] || 'placeholder.jpg'}" loading="lazy" alt="${p.name}">
          <div class="product-info">
            <h3>${p.name}</h3>
            <div class="brand">${p.brand}</div>
            <div class="price-tag">$${p.price.toLocaleString()}</div>
            <button class="add-btn" onclick="addToCart(${p.id})">ADD TO LOADOUT</button>
            <button class="add-btn" onclick="equipItem(products.find(x => x.id === ${p.id}))">EQUIP</button>
          </div>
        </div>
      `).join("");
    }

    // ──────────────────────────────────────────────
    // FILTERS & TABS
    // ──────────────────────────────────────────────
    function applyFilters() {
      const q = document.getElementById("search")?.value.toLowerCase() || "";
      const brand = document.getElementById("brand-filter")?.value || "";
      const sort = document.getElementById("sort")?.value || "name";

      filtered = products.filter(p => {
        const matchesSearch = p.name.toLowerCase().includes(q) || p.brand.toLowerCase().includes(q);
        const matchesBrand = !brand || p.brand === brand;
        const matchesCategory = currentCategory === "all" || p.category === currentCategory;
        return matchesSearch && matchesBrand && matchesCategory;
      });

      filtered.sort((a, b) => {
        if (sort === "price-low") return a.price - b.price;
        if (sort === "price-high") return b.price - a.price;
        return a.name.localeCompare(b.name);
      });

      renderProducts();
    }

    function clearFilters() {
      document.getElementById("search").value = "";
      document.getElementById("brand-filter").value = "";
      document.getElementById("sort").value = "name";
      currentCategory = "all";
      document.querySelectorAll(".tab-btn").forEach(t => t.classList.remove("active"));
      document.querySelector(".tab-btn[data-category='all']").classList.add("active");
      filtered = [...products];
      renderProducts();
    }

    // Attach listeners
    const searchInput = document.getElementById("search");
    if (searchInput) searchInput.addEventListener("input", applyFilters);

    const sortSelect = document.getElementById("sort");
    if (sortSelect) sortSelect.addEventListener("change", applyFilters);

    document.querySelectorAll(".tab-btn").forEach(tab => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".tab-btn").forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
        currentCategory = tab.dataset.category;
        applyFilters();
      });
    });

    // ──────────────────────────────────────────────
    // BRAND FILTER POPULATE
    // ──────────────────────────────────────────────
    const brandFilter = document.getElementById("brand-filter");
    if (brandFilter) {
      const brands = [...new Set(products.map(p => p.brand))].sort();
      brandFilter.innerHTML += brands.map(b => `<option value="${b}">${b}</option>`).join("");
      brandFilter.addEventListener("change", applyFilters);
    }

    // ──────────────────────────────────────────────
    // INIT
    // ──────────────────────────────────────────────
    renderProducts();
    applyFilters();
  </script>

  <!-- PRODUCT DETAIL MODAL -->
  <div id="product-modal" class="modal">
    <div class="modal-content glass">
      <span class="close">&times;</span>
      <h2 id="modal-title" style="font-size:3rem; margin-bottom:1rem;"></h2>
      <div id="modal-images" style="display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:1.5rem; margin-bottom:2rem;"></div>
      <p id="modal-desc" style="font-size:1.6rem; line-height:1.7; opacity:0.9;"></p>
      <div style="margin-top:3rem; text-align:center;">
        <button class="btn" onclick="document.querySelector('.close').click()">CLOSE</button>
        <div style="margin-top:3rem;">
          <h3>Customer Reviews</h3>
          <div id="reviews"></div>
          <div style="margin-top:2rem;">
            <select id="rating">
              <option value="5">★★★★★</option>
              <option value="4">★★★★☆</option>
              <option value="3">★★★☆☆</option>
              <option value="2">★★☆☆☆</option>
              <option value="1">★☆☆☆☆</option>
            </select>
            <textarea id="reviewText" class="input" placeholder="Write your review..."></textarea>
            <button class="btn" onclick="submitReview()">SUBMIT REVIEW</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
