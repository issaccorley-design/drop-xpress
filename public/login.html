<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HUNTX – ACCESS</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1963624194864640"
     crossorigin="anonymous"></script>
</head>
<body>
  <video id="bgVideo" autoplay muted loop playsinline>
    <source src="your-video.mp4" type="video/mp4">
  </video>

  <button id="themeToggle"><i class="fa-solid fa-moon"></i></button>

  <header>
    <h1>HUNTX</h1>
    <nav>
      <a href="index.html">HOME</a>
      <a href="shop.html">ARMORY</a>
      <a href="cart.html">LOADOUT</a>
    </nav>
  </header>

  <div style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem;">
    <div class="glass" style="width:100%; max-width:500px; padding:4rem 3rem;">
      <h2 style="text-align:center; font-size: clamp(3rem, 8vw, 5rem); margin-bottom:2rem; background: linear-gradient(45deg, #ff6b00, #ffb800); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">
        OPERATIVE ACCESS
      </h2>

      <form id="loginForm" style="display:flex; flex-direction:column; gap:1.5rem;">
        <input type="email" id="email" class="input" placeholder="Email" required autocomplete="email">
        <input type="password" id="password" class="input" placeholder="Password" required autocomplete="current-password">
        <button type="submit" class="btn" style="padding:1.2rem; font-size:1.6rem;">LOGIN</button>
      </form>

      <p style="text-align:center; margin-top:2rem; font-size:1.2rem;">
        New operative? <a href="#" id="registerLink" style="color:#ff6b00; font-weight:700;">Register here</a>
      </p>

      <p id="loginMsg" style="text-align:center; margin-top:1.5rem; font-size:1.4rem; min-height:2rem; color:#ff6b00;"></p>
    </div>
  </div>

  <footer style="background:rgba(10,10,30,0.9); padding:3rem 5%; text-align:center; border-top:1px solid #ff6b00;">
    <p style="font-size:1.3rem; margin:1rem 0;">© 2026 HUNTX | Newport, Tennessee</p>
    <p style="font-size:1.2rem; opacity:0.9;">
      <a href="privacy.html" style="color:#ff6b00; margin:0 1rem;">Privacy Policy</a> |
      <a href="terms.html" style="color:#ff6b00; margin:0 1rem;">Terms of Service</a> |
      <a href="returns.html" style="color:#ff6b00; margin:0 1rem;">Returns & Refunds</a> |
      <a href="contact.html" style="color:#ff6b00; margin:0 1rem;">Contact Us</a>
    </p>
  </footer>

  <script src="script.js"></script>

  <script>
    // login.html specific logic
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const msg = document.getElementById("loginMsg");

      msg.textContent = "Authenticating...";
      msg.style.color = "#ff6b00";

      try {
        const res = await fetch(`${API_BASE}/api/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!res.ok) throw new Error(data.error || "Login failed");

        localStorage.setItem("token", data.token);
        localStorage.setItem("huntx_user", JSON.stringify(data.user));

        msg.textContent = "Access granted. Redirecting...";
        msg.style.color = "#2d8b3a";

        setTimeout(() => {
          location.href = "shop.html"; // or dashboard.html / index.html
        }, 1200);
      } catch (err) {
        msg.textContent = err.message;
        msg.style.color = "#e74c3c";
      }
    });

    // Register link (redirect or open modal – here redirect to register page if you have one)
    document.getElementById("registerLink").addEventListener("click", (e) => {
      e.preventDefault();
      // If you have register.html, redirect:
      // location.href = "register.html";
      // Or inline register form – for now alert
      alert("Registration coming soon – contact support for access.");
    });
  </script>
</body>
</html>
